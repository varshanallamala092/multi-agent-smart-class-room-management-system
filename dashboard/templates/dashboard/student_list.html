<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 85%;
            margin: 40px auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #3498db;
            color: white;
            padding: 12px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #27ae60;
        }

        .no-data {
            text-align: center;
            color: red;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Student Management System</h1>

    <div class="table-container">

        <table>
            <tr>
                <th>Name</th>
                <th>Marks</th>
                <th>Attendance</th>
                <th>Status</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.marks }}</td>
                <td>{{ student.attendance }}%</td>

                <td>
                    {% if student.marks >= 35 %}
                        Pass
                    {% else %}
                        Fail
                    {% endif %}
                </td>
            </tr>

            {% empty %}
            <tr>
                <td colspan="4" class="no-data">
                    No Students Found
                </td>
            </tr>
            {% endfor %}

        </table>

        <a href="/" class="btn">Back to Home</a>

    </div>

</div>

</body>
</html>
