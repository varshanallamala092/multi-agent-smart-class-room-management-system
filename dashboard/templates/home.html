<!DOCTYPE html>
<html>
<head>
    <title>Class Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #3498db, #8e44ad);
        }

        .container{
            text-align:center;
            background:white;
            padding:50px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
            width:600px;
        }

        h1{
            color:#2c3e50;
            margin-bottom:15px;
            font-size:40px;
        }

        p{
            color:#555;
            margin-bottom:30px;
            font-size:18px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#3498db;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            transition:0.3s;
        }

        .btn:hover{
            background:#2980b9;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome to Class Management System</h1>

    <p>
        Manage Students, Marks, Attendance and Academic Records Efficiently.
    </p>

    <a href="/students/" class="btn">
        View Students
    </a>

</div>

</body>
</html>
